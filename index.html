<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой сайт</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: white;
    text-align: center;
    background-color: #0f172a;
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    transition: 0.3s;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(10,15,30,0.6);
    z-index: -1;
}

/* Светлая тема */
.light-theme {
    background-color: #f5f7fb !important;
    color: #111827 !important;
}

.light-theme::before {
    background: rgba(255,255,255,0.6);
}

/* Контейнер */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* Навбар */
.navbar {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    background: rgba(17,24,39,0.4);
    backdrop-filter: blur(10px);
    border-radius: 12px;
}

.navbar a {
    color: #38bdf8;
    text-decoration: none;
    font-weight: bold;
}

/* Hero */
.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 40px;
}

.hero img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
}

/* Кнопки */
.btn {
    margin: 10px;
    padding: 10px 20px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    background: #38bdf8;
}

.btn-outline {
    background: transparent;
    border: 1px solid #38bdf8;
    color: #38bdf8;
}

/* Карточки */
.card {
    background: rgba(17,24,39,0.4);
    padding: 20px;
    border-radius: 16px;
    margin: 15px auto;
    width: 300px;
}

/* Навыки */
.skills li {
    list-style: none;
    margin: 10px;
}

/* Углы */
.corner {
    position: fixed;
    padding: 10px;
    border-radius: 10px;
    background: rgba(17,24,39,0.4);
}

.top-left { top:10px; left:10px; }
.top-right { top:10px; right:10px; }
.bottom-right { bottom:10px; right:10px; }

/* Эмодзи */
.floating-emoji {
    position: absolute;
    animation: fall 3s linear;
}

@keyframes fall {
    to { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- УГЛОВЫЕ ШТУКИ -->
<div class="corner top-left" onclick="emoji()">✨</div>

<div class="corner top-right">
    <div id="clock"></div>
</div>

<div class="corner bottom-right" onclick="alert('Ты молодец 🚀')">🎁</div>

<div id="rain"></div>

<div class="container">

<nav class="navbar">
    <a href="#">Главная</a>
    <a href="#projects">Проекты</a>
    <a href="#contact">Контакты</a>
</nav>

<section class="hero">
    <div>
        <p>Привет, я</p>
        <h1>Оля 👋</h1>
        <p>Начинающий разработчик</p>

        <button class="btn" onclick="toggleTheme()">Сменить тему</button>
        <button class="btn-outline" onclick="randomBg()">Фон</button>
    </div>

    <img src="https://picsum.photos/300">
</section>

<section id="projects">
    <h2>Проекты</h2>

    <div class="card">
        Мой первый сайт
    </div>

    <div class="card">
        Портфолио
    </div>
</section>

<section>
    <h2>Навыки</h2>
    <ul class="skills">
        <li>💻 HTML</li>
        <li>🎨 CSS</li>
        <li>🚀 GitHub</li>
    </ul>
</section>

<section id="contact">
    <h2>Контакты</h2>
    <p>Email: test@email.com</p>
</section>

</div>

<script>
const bgs = [
"url('https://images.unsplash.com/photo-1500530855697')",
"url('https://images.unsplash.com/photo-1477959858617')",
"url('https://images.unsplash.com/photo-1462332420958')"
];

function randomBg(){
    document.body.style.backgroundImage =
        bgs[Math.floor(Math.random()*bgs.length)];
}

function toggleTheme(){
    document.body.classList.toggle("light-theme");
}

function emoji(){
    const e = document.createElement("div");
    e.className="floating-emoji";
    e.innerText="✨";
    e.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),3000);
}

function clock(){
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString();
}
setInterval(clock,1000);
clock();
</script>

</body>
</html>
