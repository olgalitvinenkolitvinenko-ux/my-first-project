    <title>Контакты</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #081225 100%);
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .navbar {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: rgba(19, 32, 66, 0.85);
            border-radius: 14px;
            margin-top: 20px;
        }

        .navbar a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            color: white;
        }

        h1 {
            color: #38bdf8;
            margin-top: 40px;
        }

        .contact-box {
            margin-top: 30px;
            background: #132042;
            padding: 30px;
            border-radius: 16px;
        }

        .contact-box a {
            color: #38bdf8;
            text-decoration: none;
        }

        .contact-box a:hover {
            color: white;
        }
        <form class="contact-form">
    <input type="text" placeholder="Ваше имя" required>
    <input type="email" placeholder="Ваш email" required>
    <textarea placeholder="Ваше сообщение" rows="5" required></textarea>
    <button type="submit">Отправить</button>
</form>
        .contact-form {
    margin-top: 25px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.contact-form input,
.contact-form textarea {
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    background: #0f172a;
    color: white;
}

.contact-form button {
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    color: #0f172a;
    font-weight: bold;
    cursor: pointer;
}

.contact-form button:hover {
    background: #0ea5e9;
}
